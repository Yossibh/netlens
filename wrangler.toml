name = "netrecon"
compatibility_date = "2024-10-22"
pages_build_output_dir = "./dist"
compatibility_flags = ["nodejs_compat"]

# Browser Rendering binding for fallback peer-TLS inspection.
# When connect() can't reach a target (CF-owned IPs) or we need TLS 1.3, we
# spin up a headless Chromium via this binding and capture the cert chain
# through Chrome DevTools Protocol. Free plan: 10 browser-minutes/day.
[browser]
binding = "BROWSER"

# KV namespace for change-detection target registry + snapshots (Phase A).
# Create once with:
#   npx wrangler kv namespace create NETRECON_KV
# Then replace the id below with the value printed.
[[kv_namespaces]]
binding = "NETRECON_KV"
id = "74db0f54ca15417abdbf78716a398fe4"
